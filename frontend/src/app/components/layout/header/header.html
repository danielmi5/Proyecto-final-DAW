<header class="header" [class.header--scrolled]="isScrolled()" role="banner">
  <div class="header__container">
    <a class="header__logo" routerLink="/" aria-label="Estimplytics - Ir a la página de inicio" (click)="closeMobileMenu()">
      <span class="header__logo-content">Estimplytics</span>
    </a>

    <nav class="header__nav" [class.header__nav--open]="mobileMenuOpen()" aria-label="Navegación principal">
      <ul class="header__nav-list" role="list">
        @for (item of navItems; track item.path) {
          <li class="header__nav-item">
            <a class="header__nav-link" [routerLink]="item.path" routerLinkActive="header__nav-link--active" [routerLinkActiveOptions]="{ exact: item.path === '/' }" [attr.aria-label]="item.ariaLabel" (click)="closeMobileMenu()">
              {{ item.label }}
            </a>
          </li>
        }
      </ul>
    </nav>

    <div class="header__actions">
      <button class="header__avatar" type="button" aria-label="Menú de usuario" aria-haspopup="menu" aria-expanded="false">DM</button>

      <button class="header__menu" type="button" [attr.aria-expanded]="mobileMenuAriaExpanded()" [attr.aria-label]="mobileMenuOpen() ? 'Cerrar menú de navegación' : 'Abrir menú de navegación'" (click)="toggleMobileMenu()">
        <span [feather]="mobileMenuOpen() ? 'x' : 'menu'" variant="header" aria-hidden="true"></span>
      </button>
    </div>
  </div>
</header>
