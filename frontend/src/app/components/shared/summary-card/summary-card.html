<article class="summary-card">
  <div class="summary-card__icon" [class]="'summary-card__icon--' + summary().tone">
    <i [feather]="summary().icon" variant="header" aria-hidden="true"></i>
  </div>
  <div>
    <strong>{{ summary().value }}</strong>
    <span>{{ summary().label }}</span>
  </div>
</article>
