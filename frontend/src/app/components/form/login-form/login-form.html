<section class="login__content">
	<header class="login__header">
		<p class="login__eyebrow">Acceso</p>
		<h2 class="login__title login__title--content">Inicia sesión</h2>
		<p class="login__subtitle">Accede con tu correo y contraseña</p>
	</header>

	<form [formGroup]="form" (ngSubmit)="onSubmit()" class="form" aria-label="Formulario de inicio de sesión" novalidate>
		<div class="form__group">
			<app-form-input
				formControlName="email"
				id="email"
				label="Correo electrónico"
				type="email"
				[required]="true"
				placeholder="tu@email.com"
				[validationState]="fieldState('email')"
				[warningMessage]="fieldMessage('email', 'warning')"
				[errorMessage]="fieldMessage('email', 'error')"
				[successMessage]="fieldMessage('email', 'success')"
				[showSuccessMessage]="true"
			></app-form-input>
		</div>

		<div class="form__group">
			<app-form-input
				formControlName="password"
				id="password"
				type="password"
				label="Contraseña"
				[required]="true"
				placeholder="Tu contraseña"
				[validationState]="fieldState('password')"
				[warningMessage]="fieldMessage('password', 'warning')"
				[errorMessage]="fieldMessage('password', 'error')"
				[successMessage]="fieldMessage('password', 'success')"
				[showSuccessMessage]="true"
			></app-form-input>
		</div>

		<app-button variant="primary" [label]="submitLabel" buttonType="submit" [fullWidth]="true" [disabled]="form.pending"></app-button>
	</form>

	<footer class="login__footer">
		<p class="login__login">
			¿No tienes cuenta? <a routerLink="/register" class="link">Regístrate</a>
		</p>
	</footer>
</section>
